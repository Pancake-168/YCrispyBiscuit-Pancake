name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: Pancake/Client/Tauri-React/Pancake-Tauri-React

      - name: Build
        run: WEB_BUILD=true npx vite build
        working-directory: Pancake/Client/Tauri-React/Pancake-Tauri-React

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Pancake/Client/Tauri-React/Pancake-Tauri-React/dist
